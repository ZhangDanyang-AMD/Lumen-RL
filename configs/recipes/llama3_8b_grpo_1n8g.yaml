# Production recipe: Llama 3.1 8B GRPO on 1 node x 8 GPUs
# FP8 end-to-end with TIS rollout correction

cluster:
  gpus_per_node: 8
  num_nodes: 1

policy:
  model_name: meta-llama/Llama-3.1-8B-Instruct
  training_backend: fsdp2
  generation_backend: atom
  max_total_sequence_length: 8192
  train_global_batch_size: 128
  train_micro_batch_size: 4

algorithm:
  name: grpo
  grpo:
    num_generations: 16
    kl_coeff: 0.0
    clip_ratio: 0.2

quantization:
  rollout:
    precision: fp8
    use_deep_gemm: true
  training:
    fp8: hybrid
    fp8_recipe: blockwise
    fp8_weight_cache: true
  rollout_correction:
    enabled: true
    method: tis
    clip: 1.5

reward:
  type: function
  function: math_reward
  dataset: nvidia/OpenMathInstruct-2

checkpointing:
  checkpoint_dir: results/llama3_8b_grpo
  save_steps: 100

logger:
  wandb_enabled: true
  wandb:
    project: lumenrl
    name: llama3-8b-grpo-fp8

num_training_steps: 2000
seed: 42
