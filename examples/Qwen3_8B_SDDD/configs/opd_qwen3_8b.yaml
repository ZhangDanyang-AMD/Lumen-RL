# Qwen3-8B Eagle3 Speculative Decoding Draft Distillation
#
# Disaggregated architecture matching TorchSpec:
#   - 2 GPUs for inference: SGLang Engine + ATOM plugin (Aiter kernels)
#   - 2 GPUs for training: FSDP2 Eagle3 draft model
#   - Mooncake RDMA for hidden state transfer
#
# Model: Qwen/Qwen3-8B -- 8B dense, 4096 hidden, 151936 vocab, 36 layers.
# Draft: Eagle3 -- 1-layer Transformer, predicts from teacher hidden states.
#
# Data flow:
#   Dataset sequences -> SGLang+ATOM Forward (GPU 2-3, no grad)
#     -> hidden_states stored to Mooncake RDMA
#     -> Training GPUs (0-1) fetch from Mooncake
#     -> Eagle3 Forward (with grad) -> position-weighted CE loss
#     -> Backward -> Update Draft Model
#
# Requires:
#   - SGLang with TorchSpec spec_training patches
#   - ATOM (SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models)
#   - Mooncake Transfer Engine (RDMA)
#
# Usage:
#   torchrun --nproc_per_node=2 -m lumenrl.trainer.main \
#       --config examples/Qwen3_8B_SDDD/configs/opd_qwen3_8b.yaml

cluster:
  gpus_per_node: 2                      # Training GPUs only (inference on separate GPUs)
  num_nodes: 1

policy:
  model_name: Qwen/Qwen3-8B            # Teacher/target model
  training_backend: fsdp2
  generation_backend: hf
  max_total_sequence_length: 16384      # Matches TorchSpec max_seq_length
  train_global_batch_size: 2
  train_micro_batch_size: 1
  learning_rate: 1e-4                   # Matches TorchSpec
  weight_decay: 0.0                     # Matches TorchSpec (no weight decay)
  max_grad_norm: 0.5                    # Matches TorchSpec
  warmup_ratio: 0.015                   # Matches TorchSpec

algorithm:
  name: spec_distill
  spec_distill:
    draft_type: eagle3
    loss_type: forward_kl
    position_decay: 0.8                 # weight(i) = 0.8^i per TTT head
    num_target_layers: 1
    spec_length: 7                      # Matches TorchSpec ttt_length
  teacher:
    model_name: Qwen/Qwen3-8B
    inference_backend: sglang            # SGLang Engine + ATOM plugin + Mooncake
    tensor_parallel_size: 2              # TP across inference GPUs
    gpu_ids: [2, 3]                     # Inference GPUs (separate from training)
    atom_plugin: true                   # Use ATOM as SGLang model plugin (Aiter kernels)
  draft:
    from_scratch: true
    num_layers: 1

mooncake:
  protocol: rdma
  device_name: mlx5_8                   # RoCE NIC (same as TorchSpec RDMA run)
  global_segment_size: 16GB
  local_buffer_size: 4GB

quantization:
  training:
    fp8: null                           # BF16 training (Aiter attention via Lumen patch)
  rollout_correction:
    enabled: false

reward:
  type: function
  function: math_reward
  dataset: /home/danyzhan/TorchSpec/examples/data/sample_conversations.jsonl

checkpointing:
  checkpoint_dir: results/qwen3_8b_spec_distill
  save_steps: 5000                      # Matches TorchSpec save_interval
  save_total_limit: 3
  resume: true

logger:
  wandb_enabled: false
  log_interval: 1

num_training_steps: 500
seed: 42
