# Smoke test: 2-step Eagle3 spec distill with Qwen3-8B.
#
# Uses HF backend (no SGLang/Mooncake) for quick pipeline validation.
#
# Usage:
#   torchrun --nproc_per_node=2 -m lumenrl.trainer.main \
#       --config examples/Qwen3_8B_SDDD/configs/smoke_test.yaml

cluster:
  gpus_per_node: 2
  num_nodes: 1

policy:
  model_name: Qwen/Qwen3-8B
  training_backend: fsdp2
  generation_backend: hf
  max_total_sequence_length: 2048
  train_global_batch_size: 2
  train_micro_batch_size: 1
  learning_rate: 1e-4
  weight_decay: 0.01
  max_grad_norm: 0.5

algorithm:
  name: spec_distill
  spec_distill:
    draft_type: eagle3
    loss_type: forward_kl
    position_decay: 0.8
    num_target_layers: 1
  teacher:
    model_name: Qwen/Qwen3-8B
    inference_backend: hf               # HF for smoke test (no Mooncake needed)
  draft:
    from_scratch: true
    num_layers: 1

quantization:
  training:
    fp8: null
  rollout_correction:
    enabled: false

reward:
  type: function
  function: math_reward
  dataset: nvidia/OpenMathInstruct-2

checkpointing:
  checkpoint_dir: results/smoke_qwen3_8b_spec_distill
  save_steps: 999
  resume: false

logger:
  wandb_enabled: false
  log_interval: 1

num_training_steps: 2
seed: 42
