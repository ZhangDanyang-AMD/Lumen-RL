# Phase 1: OOM test with global_batch_size=24, micro_batch_size=1
# Only runs 20 steps to verify memory fits after streaming refactor

cluster:
  gpus_per_node: 4
  num_nodes: 1

policy:
  model_name: /dev/shm/Kimi-K2.5-BF16
  training_backend: fsdp2
  generation_backend: hf
  max_total_sequence_length: 20000
  train_global_batch_size: 128
  train_micro_batch_size: 1
  learning_rate: 5e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  warmup_ratio: 0.015

algorithm:
  name: spec_distill
  spec_distill:
    draft_type: eagle3
    loss_type: forward_kl
    position_decay: 0.8
    num_target_layers: 1
    spec_length: 4
  teacher:
    model_name: /dev/shm/Kimi-K2.5-BF16
    inference_backend: vllm
    tensor_parallel_size: 4
    gpu_ids: [4, 5, 6, 7]
    quantization: ""
  draft:
    from_scratch: true
    num_layers: 1
    num_heads: 64
    head_dim: 128
    ffn_dim: 12288
    rms_norm_eps: 1e-6
    rope_theta: 1000000.0
    max_window_layers: 36
    dtype: bfloat16

mooncake:
  protocol: tcp
  device_name: ""
  global_segment_size: 16GB
  local_buffer_size: 4GB

quantization:
  training:
    fp8: null
    lumen_norm: true
    lumen_linear: true
    hf_attn_patch: true
  rollout_correction:
    enabled: false

reward:
  type: function
  function: math_reward
  dataset: /dev/shm/kimi-mtp-dataset-phase1/train.jsonl

eval:
  enabled: false

checkpointing:
  checkpoint_dir: /dev/shm/checkpoints/kimi_k25_eagle3_bs24_test
  save_steps: 100
  save_total_limit: 1
  resume: false

logger:
  wandb_enabled: false
  log_interval: 1

num_training_steps: 10
seed: 42
