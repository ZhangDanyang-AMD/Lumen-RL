# Phase 1: ATOM backend correctness test
# Resume from checkpoint_19200, run 10 steps, verify accuracy matches vLLM

cluster:
  gpus_per_node: 4
  num_nodes: 1

policy:
  model_name: /dev/shm/Kimi-K2.5-BF16
  training_backend: fsdp2
  generation_backend: hf
  max_total_sequence_length: 20000
  train_global_batch_size: 8
  train_micro_batch_size: 1
  learning_rate: 5e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  warmup_ratio: 0.015

algorithm:
  name: spec_distill
  spec_distill:
    draft_type: eagle3
    loss_type: forward_kl
    position_decay: 0.8
    num_target_layers: 1
    spec_length: 4
  teacher:
    model_name: /dev/shm/Kimi-K2.5-MXFP4
    inference_backend: atom
    tensor_parallel_size: 4
    gpu_ids: [4, 5, 6, 7]
    quantization: ""
    transport: mooncake
    atom:
      enforce_eager: true
      trust_remote_code: true
      extra_args:
        kv_cache_dtype: fp8
        max_num_batched_tokens: 20000
        max_model_len: 20016
        gpu_memory_utilization: 0.9
        level: 0
  draft:
    from_scratch: true
    num_layers: 1
    num_heads: 64
    head_dim: 128
    ffn_dim: 12288
    rms_norm_eps: 1e-6
    rope_theta: 1000000.0
    max_window_layers: 36
    dtype: bfloat16

mooncake:
  protocol: tcp
  device_name: ""
  global_segment_size: 16GB
  local_buffer_size: 4GB

quantization:
  training:
    fp8: null
    lumen_norm: true
    lumen_linear: true
    hf_attn_patch: true
  rollout_correction:
    enabled: false

reward:
  type: function
  function: math_reward
  dataset: /dev/shm/kimi-mtp-dataset-phase1/train.jsonl

eval:
  enabled: false

checkpointing:
  checkpoint_dir: /dev/shm/checkpoints/kimi_k25_eagle3_v2_phase1
  save_steps: 100
  save_total_limit: 3
  resume: true

logger:
  wandb_enabled: false
  log_interval: 1

num_training_steps: 19210  # resume from 19200, run 10 test steps
seed: 42
