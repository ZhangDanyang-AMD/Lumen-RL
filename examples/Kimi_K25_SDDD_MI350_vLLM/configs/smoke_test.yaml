# Kimi K2.5 SDDD Smoke Test — MI350 (vLLM + ATOM + MXFP4 + Mooncake TCP)
#
# Full-pipeline 2-step validation using Qwen3-8B as stand-in teacher.
# Tests the complete vLLM + ATOM MXFP4 quantization + Mooncake TCP path.
#
# GPU split (8x MI350):
#   GPUs 0-3: torchrun FSDP2 draft model training (BF16, LumenRL + aiter)
#   GPUs 4-7: vLLM + ATOM teacher inference (TP=4, MXFP4, aiter)
#
# Usage:
#   bash examples/Kimi_K25_SDDD_MI350_vLLM/run_kimi_k25.sh --smoke-test

cluster:
  gpus_per_node: 4
  num_nodes: 1

policy:
  model_name: /dev/shm/Qwen3-8B
  training_backend: fsdp2
  generation_backend: hf
  max_total_sequence_length: 2048
  train_global_batch_size: 8
  train_micro_batch_size: 1
  learning_rate: 1e-4
  weight_decay: 0.0
  max_grad_norm: 1.0
  warmup_ratio: 0.0

algorithm:
  name: spec_distill
  spec_distill:
    draft_type: eagle3
    loss_type: forward_kl
    position_decay: 0.8
    num_target_layers: 1
  teacher:
    model_name: /dev/shm/Qwen3-8B
    inference_backend: vllm
    tensor_parallel_size: 4
    gpu_ids: [4, 5, 6, 7]
    quantization: mxfp4
  draft:
    from_scratch: true
    num_layers: 1

mooncake:
  protocol: tcp
  device_name: ""
  global_segment_size: 16GB
  local_buffer_size: 4GB

quantization:
  training:
    fp8: null
  rollout_correction:
    enabled: false

reward:
  type: function
  function: math_reward

checkpointing:
  checkpoint_dir: /dev/shm/checkpoints/kimi_k25_smoke_test_vllm
  save_steps: 9999
  save_total_limit: 1
  resume: false

logger:
  wandb_enabled: false
  log_interval: 1

num_training_steps: 2
seed: 42
