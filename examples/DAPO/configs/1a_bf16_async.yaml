# Experiment 1A-Async: BF16 Training + BF16 Rollout — Fully Async Mode
# Qwen3-8B on 8×MI350X, DAPO algorithm
# Uses AsyncRLTrainer with decoupled rollout and training threads.
# Same hyperparameters as 1a_bf16_baseline.yaml to allow direct comparison.

cluster:
  num_nodes: 1
  gpus_per_node: 8

policy:
  model_name: /dev/shm/model/qwen3-8b-base
  training_backend: fsdp2
  generation_backend: atom
  max_total_sequence_length: 8192
  max_response_length: 7168
  train_global_batch_size: 128       # 8 prompts × 16 generations
  train_micro_batch_size: 1
  max_token_len_per_gpu: 8192
  generation:
    atom_cfg:
      gpu_memory_utilization: 0.13
      max_model_len: 8192

algorithm:
  name: dapo
  dapo:
    num_generations: 16
    kl_coeff: 0.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    dynamic_sampling: true
    token_level_pg: true
    overlong_reward_shaping: true

reward:
  type: function
  function: lumenrl.rewards.math_reward.dapo_math_reward
  dataset: /dev/shm/data/dapo-math-17k.parquet

quantization:
  rollout:
    precision: bf16
  training:
    fp8: null

checkpointing:
  checkpoint_dir: /root/ckpts/lumenrl-dapo/1a-bf16-async
  save_steps: 25
  save_total_limit: 3

logger:
  wandb_enabled: false
  log_interval: 1

async_training:
  enabled: true
  require_batches: 4
  trigger_parameter_sync_step: 1
  staleness_threshold: 0.0
  partial_rollout: false
  use_rollout_log_probs: false
  queue_maxsize: 64
  weight_sync_dir: /tmp/lumenrl_weight_sync

num_training_steps: 275
seed: 42
