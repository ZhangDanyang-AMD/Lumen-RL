# Kimi K2.5 Eagle3 Draft Distillation (SGLang + ATOM + NVFP4)
#
# Disaggregated architecture matching TorchSpec sglang_kimi_k25_nvfp4:
#   - 4 GPUs for inference: SGLang Engine + ATOM plugin, NVFP4 quantization
#   - 4 GPUs for training: FSDP2 Eagle3 draft model (BF16)
#   - Mooncake RDMA for hidden state transfer
#
# Model: moonshotai/Kimi-K2.5 (nvidia/Kimi-K2.5-NVFP4 quantized)
#        1T MoE (32B activated), hidden=7168, 64 heads, 61 layers, vocab=163840
# Draft: Eagle3 -- 1-layer Transformer, predicts from teacher hidden states
#
# Data flow:
#   Dataset sequences -> SGLang+ATOM Forward (GPU 4-7, no grad, NVFP4)
#     -> hidden_states stored to Mooncake RDMA
#     -> Training GPUs (0-3) fetch from Mooncake
#     -> Eagle3 Forward (with grad) -> position-weighted CE loss
#     -> Backward -> Update Draft Model
#
# Usage:
#   bash examples/Kimi_K25_SDDD/run_kimi_k25.sh

cluster:
  gpus_per_node: 4                      # Training GPUs only
  num_nodes: 1

policy:
  model_name: nvidia/Kimi-K2.5-NVFP4   # For tokenizer + draft model dimensions
  training_backend: fsdp2
  generation_backend: hf
  max_total_sequence_length: 8192       # Matches TorchSpec max_seq_length
  train_global_batch_size: 8
  train_micro_batch_size: 2
  learning_rate: 1e-4                   # Matches TorchSpec
  weight_decay: 0.0
  max_grad_norm: 1.0                    # Matches TorchSpec
  warmup_ratio: 0.0                     # Matches TorchSpec NVFP4 config

algorithm:
  name: spec_distill
  spec_distill:
    draft_type: eagle3
    loss_type: forward_kl
    position_decay: 0.8                 # weight(i) = 0.8^i per speculative step
    num_target_layers: 1
    spec_length: 5                      # Matches TorchSpec ttt_length for NVFP4
  teacher:
    model_name: nvidia/Kimi-K2.5-NVFP4
    inference_backend: sglang
    tensor_parallel_size: 4             # TP across inference GPUs
    gpu_ids: [4, 5, 6, 7]              # Inference GPUs (separate from training)
    atom_plugin: true                   # Use ATOM as SGLang model plugin
    quantization: fp4                   # NVFP4 quantization via modelopt_fp4
  draft:
    from_scratch: true
    num_layers: 1

mooncake:
  protocol: rdma
  device_name: mlx5_8
  global_segment_size: 16GB
  local_buffer_size: 4GB
  hidden_dim: 7168                      # Kimi K2.5 hidden_size

quantization:
  training:
    fp8: null                           # BF16 draft training
  rollout_correction:
    enabled: false

reward:
  type: function
  function: math_reward
  dataset: /home/danyzhan/TorchSpec/examples/data/sample_conversations.jsonl

checkpointing:
  checkpoint_dir: results/kimi_k25_eagle3_sglang_nvfp4
  save_steps: 500
  save_total_limit: 3
  resume: true

logger:
  wandb_enabled: false
  log_interval: 1

num_training_steps: 500
seed: 42
