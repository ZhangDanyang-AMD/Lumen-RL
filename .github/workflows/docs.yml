name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'lumenrl-docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lumenrl-docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r lumenrl-docs/docs/requirements.txt

      - name: Build Sphinx documentation
        run: |
          cd lumenrl-docs/docs
          sphinx-build -b html source build/html -W --keep-going

      - name: Assemble site
        run: |
          mkdir -p _site
          cp lumenrl-docs/site/index.html _site/index.html
          cp -r lumenrl-docs/docs/build/html _site/docs

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
