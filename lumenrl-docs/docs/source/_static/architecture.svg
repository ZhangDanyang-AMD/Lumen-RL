  <text x="711" y="300" text-anchor="middle" fill="#555" font-size="8.5" font-family="sans-serif">TP / PP / EP / DP</text>

  <rect x="788" y="266" width="125" height="48" rx="6" fill="#ffcdd2" stroke="#d32f2f" stroke-width="1"/>
  <text x="851" y="286" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600" font-family="sans-serif">FP8 Training</text>
  <text x="851" y="300" text-anchor="middle" fill="#555" font-size="8.5" font-family="sans-serif">Hybrid E4M3 / E5M2</text>

  <rect x="508" y="324" width="200" height="40" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="608" y="342" text-anchor="middle" fill="#e65100" font-size="9.5" font-weight="600" font-family="sans-serif">Router Replayer (R3)</text>
  <text x="608" y="356" text-anchor="middle" fill="#777" font-size="8" font-family="sans-serif">Inject routing distributions</text>

  <rect x="718" y="324" width="200" height="40" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="818" y="342" text-anchor="middle" fill="#283593" font-size="9.5" font-weight="600" font-family="sans-serif">MoE Grouped GEMM</text>
  <text x="818" y="356" text-anchor="middle" fill="#777" font-size="8" font-family="sans-serif">AITER Fused Experts</text>

  <!-- R3 arrow: Recorder -> down -> across -> up -> Replayer -->
  <line x1="148" y1="364" x2="148" y2="394" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="148" y1="394" x2="608" y2="394" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="608" y1="394" x2="608" y2="370" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="608,364 603,372 613,372" fill="#e65100"/>



  <!-- Arrow down -->
  <line x1="480" y1="402" x2="480" y2="418" stroke="#999" stroke-width="1.5"/>
  <polygon points="480,422 475,414 485,414" fill="#999"/>

  <!-- Layer 3: FP8-RL Quantization -->
  <rect x="30" y="422" width="900" height="64" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
