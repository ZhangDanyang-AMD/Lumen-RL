  <rect x="48" y="451" width="192" height="26" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="144" y="469" text-anchor="middle" fill="#bf360c" font-size="9.5" font-weight="600" font-family="sans-serif">FP8 Rollout (W8A8)</text>

  <rect x="252" y="451" width="192" height="26" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="348" y="469" text-anchor="middle" fill="#bf360c" font-size="9.5" font-weight="600" font-family="sans-serif">FP8 Weight Quantizer</text>

  <rect x="456" y="451" width="192" height="26" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="552" y="469" text-anchor="middle" fill="#bf360c" font-size="9.5" font-weight="600" font-family="sans-serif">FP8 KV-Cache Quant</text>

  <rect x="660" y="451" width="252" height="26" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="786" y="469" text-anchor="middle" fill="#bf360c" font-size="9.5" font-weight="600" font-family="sans-serif">Rollout Correction (TIS / MIS)</text>

  <!-- Arrow down -->
  <line x1="480" y1="486" x2="480" y2="504" stroke="#999" stroke-width="1.5"/>
  <polygon points="480,508 475,500 485,500" fill="#999"/>

  <!-- Layer 4: AITER + MORI -->
  <rect x="30" y="508" width="440" height="68" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="250" y="530" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="0.5">AITER  |  KERNEL PROVIDER</text>
  <text x="250" y="548" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">ASM &gt; CK &gt; Triton fallback chain</text>
  <text x="250" y="564" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">Attention / GEMM / MoE / Norm / RoPE</text>

  <rect x="490" y="508" width="440" height="68" rx="10" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
  <text x="710" y="530" text-anchor="middle" fill="#00695c" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="0.5">MORI  |  COMMUNICATION PROVIDER</text>
  <text x="710" y="548" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">MORI-CCL (AG, RS, AR) + MORI-EP (MoE)</text>
  <text x="710" y="564" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">Device-side RDMA / FP8 / AINIC / CX-7</text>

  <!-- Arrow down -->
  <line x1="480" y1="576" x2="480" y2="596" stroke="#999" stroke-width="1.5"/>
  <polygon points="480,600 475,592 485,592" fill="#999"/>

  <!-- Layer 5: Hardware -->
  <rect x="30" y="600" width="900" height="52" rx="10" fill="#fde8e8" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="480" y="620" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600" font-family="sans-serif" letter-spacing="1">HARDWARE</text>
  <text x="480" y="640" text-anchor="middle" fill="#333" font-size="15" font-weight="700" font-family="sans-serif">AMD Instinct MI300X / MI355X  --  ROCm</text>

  <!-- Footer -->
  <text x="480" y="674" text-anchor="middle" fill="#999" font-size="9.5" font-style="italic" font-family="sans-serif">All cross-worker communication via DataProto  |  Ray-orchestrated  |  AMD-native</text>

</svg>
