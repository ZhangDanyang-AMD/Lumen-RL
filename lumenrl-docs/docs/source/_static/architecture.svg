<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">

  <rect width="960" height="700" rx="16" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1"/>

  <text x="480" y="30" text-anchor="middle" fill="#333" font-size="18" font-weight="700" font-family="sans-serif" letter-spacing="0.5">LumenRL Architecture</text>

  <!-- Layer 0: RL Algorithms -->
  <rect x="30" y="48" width="900" height="52" rx="10" fill="#f3e8f5" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="480" y="68" text-anchor="middle" fill="#7b1fa2" font-size="10" font-weight="600" font-family="sans-serif" letter-spacing="1">RL ALGORITHMS</text>
  <text x="240" y="87" text-anchor="middle" fill="#333" font-size="14" font-weight="600" font-family="sans-serif">GRPO</text>
  <text x="480" y="87" text-anchor="middle" fill="#333" font-size="14" font-weight="600" font-family="sans-serif">DAPO</text>
  <text x="720" y="87" text-anchor="middle" fill="#333" font-size="14" font-weight="600" font-family="sans-serif">PPO</text>

  <line x1="480" y1="100" x2="480" y2="118" stroke="#999" stroke-width="1.5"/>
  <polygon points="480,122 475,114 485,114" fill="#999"/>

  <!-- Layer 1: Ray Controller -->
  <rect x="30" y="122" width="900" height="72" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="480" y="142" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600" font-family="sans-serif" letter-spacing="1">RAY CONTROLLER</text>

  <rect x="55"  y="150" width="148" height="34" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="129" y="172" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="600" font-family="sans-serif">RLTrainer</text>

  <rect x="218" y="150" width="148" height="34" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="292" y="172" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="600" font-family="sans-serif">DataManager</text>

  <rect x="381" y="150" width="148" height="34" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="455" y="172" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="600" font-family="sans-serif">WorkerGroups</text>

  <rect x="544" y="150" width="148" height="34" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="618" y="172" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="600" font-family="sans-serif">Callbacks</text>

  <rect x="707" y="150" width="198" height="34" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="806" y="172" text-anchor="middle" fill="#1565c0" font-size="11" font-weight="600" font-family="sans-serif">Checkpoint / Logging</text>

  <!-- Dispatch / Collect -->
  <text x="240" y="208" text-anchor="middle" fill="#999" font-size="9" font-weight="600" font-family="sans-serif">dispatch DataProto</text>
  <line x1="240" y1="212" x2="240" y2="230" stroke="#999" stroke-width="1.5"/>
  <polygon points="240,234 235,226 245,226" fill="#999"/>

  <text x="720" y="208" text-anchor="middle" fill="#999" font-size="9" font-weight="600" font-family="sans-serif">collect DataProto</text>
  <line x1="720" y1="212" x2="720" y2="230" stroke="#999" stroke-width="1.5"/>
  <polygon points="720,234 715,226 725,226" fill="#999"/>

