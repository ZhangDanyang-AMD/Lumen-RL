  <text x="111" y="286" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600" font-family="sans-serif">FP8 W8A8</text>
  <text x="111" y="300" text-anchor="middle" fill="#555" font-size="8.5" font-family="sans-serif">Blockwise Quant</text>

  <rect x="183" y="266" width="125" height="48" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="246" y="286" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600" font-family="sans-serif">FP8 KV-Cache</text>
  <text x="246" y="300" text-anchor="middle" fill="#555" font-size="8.5" font-family="sans-serif">QKV Recalibration</text>

  <rect x="318" y="266" width="135" height="48" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="386" y="286" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600" font-family="sans-serif">MoE EP</text>
  <text x="386" y="300" text-anchor="middle" fill="#555" font-size="8.5" font-family="sans-serif">MORI Dispatch</text>

  <rect x="48" y="324" width="200" height="40" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="148" y="342" text-anchor="middle" fill="#e65100" font-size="9.5" font-weight="600" font-family="sans-serif">Router Recorder (R3)</text>
  <text x="148" y="356" text-anchor="middle" fill="#777" font-size="8" font-family="sans-serif">Capture MoE routing logits</text>

  <rect x="258" y="324" width="200" height="40" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="358" y="342" text-anchor="middle" fill="#283593" font-size="9.5" font-weight="600" font-family="sans-serif">Generation Interface</text>
  <text x="358" y="356" text-anchor="middle" fill="#777" font-size="8" font-family="sans-serif">Batch rollout + sampling</text>

  <!-- Layer 2 Right: Lumen Training -->
  <rect x="490" y="234" width="440" height="168" rx="10" fill="#fde8e8" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="710" y="256" text-anchor="middle" fill="#c62828" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="1">LUMEN  |  TRAINING ENGINE</text>

  <rect x="508" y="266" width="125" height="48" rx="6" fill="#ffcdd2" stroke="#d32f2f" stroke-width="1"/>
