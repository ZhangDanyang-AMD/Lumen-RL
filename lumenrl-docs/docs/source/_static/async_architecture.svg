<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e3a4a"/>
      <stop offset="100%" stop-color="#081e2a"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d3010"/>
      <stop offset="100%" stop-color="#221c0a"/>
    </linearGradient>
    <linearGradient id="gEmerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4434"/>
      <stop offset="100%" stop-color="#07221a"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2050"/>
      <stop offset="100%" stop-color="#161030"/>
    </linearGradient>
    <linearGradient id="gChip" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <!-- Flow arrow gradients -->
    <linearGradient id="flowCyanAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="flowAmberGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="mAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#fbbf24"/>
    </marker>
    <marker id="mGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#34d399"/>
    </marker>
    <marker id="mVioR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a78bfa"/>
    </marker>
    <marker id="mVioL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0,0 3,8 6" fill="#a78bfa"/>
    </marker>
    <!-- Glow filter -->
    <filter id="gw">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gw2">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" rx="16" fill="url(#bg)"/>
  <!-- Subtle grid dots -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#fff"/>
    </pattern>
    <rect width="960" height="540" fill="url(#dots)"/>
  </g>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#22d3ee" font-size="20" font-weight="700" letter-spacing="-0.3">LumenRL Fully Async Training</text>
  <text x="480" y="54" text-anchor="middle" fill="#556680" font-size="11">Decoupled Rollout + Training Pipeline  ·  Up to 2.7x Throughput</text>

  <!-- ====================================== -->
  <!--                ROLLOUTER NODE                       -->
  <!-- ====================================== -->
  <rect x="28" y="76" width="220" height="192" rx="14" fill="url(#gCyan)" stroke="#22d3ee" stroke-width="1.3"/>
  <!-- Icon: play/generate -->
  <g transform="translate(120, 92)">
    <circle cx="20" cy="12" r="16" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
    <polygon points="14 4, 30 12, 14 20" fill="#22d3ee" opacity="0.8"/>
  </g>
  <text x="138" y="134" text-anchor="middle" fill="#22d3ee" font-size="15" font-weight="700">Rollouter</text>
  <!-- Detail chips -->
  <rect x="42" y="146" width="192" height="24" rx="5" fill="url(#gChip)" stroke="#0891b2" stroke-width="0.6"/>
  <text x="138" y="163" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">ATOM / vLLM Engine</text>
  <rect x="42" y="176" width="192" height="24" rx="5" fill="url(#gChip)" stroke="#0891b2" stroke-width="0.6"/>
  <text x="138" y="193" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">FP8 Streaming Generation</text>
  <rect x="42" y="206" width="192" height="24" rx="5" fill="url(#gChip)" stroke="#0891b2" stroke-width="0.6"/>
  <text x="138" y="223" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">One Sample at a Time</text>
  <!-- GPU badge -->
  <rect x="42" y="238" width="62" height="18" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="0.6"/>
  <text x="73" y="250" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="700">GPU 0-3</text>

  <!-- ====================================== -->
  <!--               MESSAGE QUEUE NODE                    -->
  <!-- ====================================== -->
  <rect x="338" y="76" width="264" height="192" rx="14" fill="url(#gAmber)" stroke="#fbbf24" stroke-width="1.3"/>
  <!-- Icon: queue bars -->
  <g transform="translate(425, 90)">
    <rect x="0"  y="10" width="10" height="16" rx="2" fill="#fbbf24" opacity="0.4"/>
    <rect x="14" y="5"  width="10" height="21" rx="2" fill="#fbbf24" opacity="0.55"/>
    <rect x="28" y="0"  width="10" height="26" rx="2" fill="#fbbf24" opacity="0.75"/>
    <rect x="42" y="3"  width="10" height="23" rx="2" fill="#fbbf24" opacity="0.9"/>
    <rect x="56" y="8"  width="10" height="18" rx="2" fill="#fbbf24" opacity="0.6"/>
    <rect x="70" y="13" width="10" height="13" rx="2" fill="#fbbf24" opacity="0.35"/>
  </g>
  <text x="470" y="134" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">MessageQueue</text>
  <!-- Detail chips -->
  <rect x="352" y="146" width="236" height="24" rx="5" fill="url(#gChip)" stroke="#d97706" stroke-width="0.6"/>
  <text x="470" y="163" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Thread-Safe Sample Buffer</text>
  <rect x="352" y="176" width="236" height="24" rx="5" fill="url(#gChip)" stroke="#d97706" stroke-width="0.6"/>
  <text x="470" y="193" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Freshness + Staleness Control</text>
  <rect x="352" y="206" width="236" height="24" rx="5" fill="url(#gChip)" stroke="#d97706" stroke-width="0.6"/>
  <text x="470" y="223" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Bounded Capacity (maxsize)</text>
  <!-- Metrics badge -->
  <rect x="352" y="238" width="100" height="18" rx="4" fill="#3d3010" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="402" y="250" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="700">queue_depth</text>
  <rect x="460" y="238" width="128" height="18" rx="4" fill="#3d3010" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="524" y="250" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="700">staleness_ratio</text>

  <!-- ====================================== -->
  <!--                 TRAINER NODE                        -->
  <!-- ====================================== -->
  <rect x="696" y="76" width="232" height="192" rx="14" fill="url(#gEmerald)" stroke="#34d399" stroke-width="1.3"/>
  <!-- Icon: gradient arrow -->
  <g transform="translate(789, 92)">
    <circle cx="14" cy="12" r="16" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <path d="M6 18 L14 4 L22 18" fill="none" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <line x1="14" y1="8" x2="14" y2="20" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
  <text x="812" y="134" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700">Trainer</text>
  <!-- Detail chips -->
  <rect x="710" y="146" width="206" height="24" rx="5" fill="url(#gChip)" stroke="#059669" stroke-width="0.6"/>
  <text x="813" y="163" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">FSDP2 Gradient Updates</text>
  <rect x="710" y="176" width="206" height="24" rx="5" fill="url(#gChip)" stroke="#059669" stroke-width="0.6"/>
  <text x="813" y="193" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Gradient Accumulation</text>
  <rect x="710" y="206" width="206" height="24" rx="5" fill="url(#gChip)" stroke="#059669" stroke-width="0.6"/>
  <text x="813" y="223" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Dynamic Mini-Batching</text>
  <!-- GPU badge -->
  <rect x="710" y="238" width="62" height="18" rx="4" fill="#0c4434" stroke="#34d399" stroke-width="0.6"/>
  <text x="741" y="250" text-anchor="middle" fill="#34d399" font-size="8" font-weight="700">GPU 4-7</text>

  <!-- ====================================== -->
  <!--              WEIGHT SYNC NODE                       -->
  <!-- ====================================== -->
  <rect x="310" y="340" width="330" height="116" rx="14" fill="url(#gViolet)" stroke="#a78bfa" stroke-width="1.3"/>
  <!-- Icon: sync arrows -->
  <g transform="translate(450, 354)">
    <path d="M-8 6 A12 12 0 1 1 8 -6" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <polygon points="8,-6 12,-1 5,-1" fill="#a78bfa" opacity="0.7"/>
    <path d="M8 -2 A12 12 0 1 1 -8 10" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <polygon points="-8,10 -12,5 -5,5" fill="#a78bfa" opacity="0.7"/>
  </g>
  <text x="475" y="390" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="700">WeightSync</text>
  <!-- Detail chips -->
  <rect x="324" y="400" width="146" height="22" rx="5" fill="url(#gChip)" stroke="#7c3aed" stroke-width="0.6"/>
  <text x="397" y="415" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Safetensors Snapshots</text>
  <rect x="480" y="400" width="146" height="22" rx="5" fill="url(#gChip)" stroke="#7c3aed" stroke-width="0.6"/>
  <text x="553" y="415" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Versioned Transfers</text>
  <!-- Sync period label -->
  <text x="475" y="444" text-anchor="middle" fill="#7c6cb5" font-size="9.5" font-style="italic">Sync every N training steps</text>

  <!-- ====================================== -->
  <!--                 FLOW ARROWS                         -->
  <!-- ====================================== -->

  <!-- Rollouter -> Queue (samples) -->
  <line x1="250" y1="165" x2="336" y2="165" stroke="url(#flowCyanAmber)" stroke-width="3" marker-end="url(#mAmber)" filter="url(#gw)"/>
  <!-- Flow particles -->
  <circle r="3" fill="#22d3ee" opacity="0.9" filter="url(#gw)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M250,165 L336,165"/>
  </circle>
  <circle r="3" fill="#67e8f9" opacity="0.6" filter="url(#gw)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M250,165 L336,165" begin="0.7s"/>
  </circle>
  <!-- Label -->
  <rect x="264" y="140" width="60" height="16" rx="4" fill="#0f1729" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="294" y="151" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">samples</text>

  <!-- Queue -> Trainer (batches) -->
  <line x1="604" y1="165" x2="694" y2="165" stroke="url(#flowAmberGreen)" stroke-width="3" marker-end="url(#mGreen)" filter="url(#gw)"/>
  <!-- Flow particles -->
  <circle r="3" fill="#fbbf24" opacity="0.9" filter="url(#gw)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M604,165 L694,165"/>
  </circle>
  <circle r="3" fill="#fcd34d" opacity="0.6" filter="url(#gw)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M604,165 L694,165" begin="0.7s"/>
  </circle>
  <!-- Label -->
  <rect x="618" y="140" width="60" height="16" rx="4" fill="#0f1729" stroke="#34d399" stroke-width="0.5"/>
  <text x="648" y="151" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700">batches</text>

  <!-- Trainer -> WeightSync (curved) -->
  <path d="M812 270 C812 320 680 340 642 345" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#mVioR)" filter="url(#gw)"/>
  <text x="750" y="308" text-anchor="middle" fill="#a78bfa" font-size="8.5" font-weight="600" opacity="0.7">push weights</text>

  <!-- WeightSync -> Rollouter (curved) -->
  <path d="M308 345 C260 340 140 320 138 270" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#mVioL)" filter="url(#gw)"/>
  <text x="200" y="308" text-anchor="middle" fill="#a78bfa" font-size="8.5" font-weight="600" opacity="0.7">load weights</text>

  <!-- ====================================== -->
  <!--                 MODE BADGES                         -->
  <!-- ====================================== -->
  <g transform="translate(28, 505)">
    <rect x="0" y="0" width="155" height="24" rx="6" fill="url(#gCyan)" stroke="#22d3ee" stroke-width="0.8"/>
    <circle cx="14" cy="12" r="4" fill="#22d3ee" opacity="0.6"/>
    <text x="86" y="16" text-anchor="middle" fill="#22d3ee" font-size="9.5" font-weight="700">A: On-Policy  1.0x</text>

    <rect x="170" y="0" width="195" height="24" rx="6" fill="url(#gAmber)" stroke="#fbbf24" stroke-width="0.8"/>
    <circle cx="184" cy="12" r="4" fill="#fbbf24" opacity="0.6"/>
    <text x="277" y="16" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="700">B: Stream Off-Policy  1.6x</text>

    <rect x="380" y="0" width="195" height="24" rx="6" fill="url(#gEmerald)" stroke="#34d399" stroke-width="0.8"/>
    <circle cx="394" cy="12" r="4" fill="#34d399" opacity="0.6"/>
    <text x="487" y="16" text-anchor="middle" fill="#34d399" font-size="9.5" font-weight="700">C: Async + Stale  2.0x</text>

    <rect x="590" y="0" width="195" height="24" rx="6" fill="#2a0e18" stroke="#fb7185" stroke-width="0.8"/>
    <circle cx="604" cy="12" r="4" fill="#fb7185" opacity="0.6"/>
    <text x="697" y="16" text-anchor="middle" fill="#fb7185" font-size="9.5" font-weight="700">D: Async + Partial  2.7x</text>
  </g>
</svg>
